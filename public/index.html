<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>Shot-Log</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main id="app" class="app-shell">
    <section id="start-screen" class="screen start-screen" aria-labelledby="title">
      <div class="top-bar">
        <div class="brand">SHOT-LOG</div>
        <div class="counter" aria-label="Anzahl eingelöster Shots">
          <span id="count">–</span>
          <small>eingelöst</small>
        </div>
      </div>

      <div class="form-card">
        <h1 id="title">Gratis-Shot prüfen</h1>
        <p id="form-description" class="hint">Personalausweisnummer eingeben</p>

        <form id="redeem-form" novalidate>
          <label class="sr-only" for="identifier">Personalausweisnummer</label>
          <input
            id="identifier"
            name="identifier"
            type="text"
            inputmode="text"
            autocomplete="off"
            autocapitalize="characters"
            spellcheck="false"
            maxlength="120"
            placeholder="z. B. L01X00T47"
            aria-describedby="form-description error-message"
          />
          <p id="error-message" class="error-message" role="alert" aria-live="polite"></p>

          <button id="submit-button" class="primary-button" type="submit">Prüfen</button>
        </form>

        <button id="alternative-button" class="text-button" type="button">Andere Angabe</button>
        <p id="privacy-note" class="privacy-note">Die eingegebene Angabe wird nicht im Klartext gespeichert.</p>
      </div>
    </section>

    <section id="result-screen" class="screen result-screen hidden" role="button" tabindex="0" aria-live="assertive">
      <div class="result-content">
        <div id="result-icon" class="result-icon" aria-hidden="true">✓</div>
        <h2 id="result-title"></h2>
        <p id="result-subtitle">Tippen zum Fortfahren</p>
      </div>
    </section>
  </main>

  <script src="/app.js" defer></script>
</body>
</html>
